site_name: Introductory Econometrics (W2026)
site_description: Course materials, guides, and references for Introductory Econometrics (W2026).
site_url: https://lorenzonavarini.github.io/intro_metrics_W2026/

repo_url: https://github.com/lorenzonavarini/intro_metrics_W2026
repo_name: lorenzonavarini/intro_metrics_W2026
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/univie-logo.png
  favicon: assets/images/univie-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/univie.css

extra_javascript:
  - javascripts/module1.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - Modules:
      - Module 1:
          - Overview: modules/module 1/module1.md
          - 1. Econometrics and Questions: modules/module 1/01-econometrics-questions.md
          - 2. Data, Models, and Causality: modules/module 1/02-data-causality.md
          - 3. Random Variables and Moments: modules/module 1/03-random-variables.md
          - 4. Conditional Distributions: modules/module 1/04-conditional-distributions.md
          - 5. Random Sampling and Convergence: modules/module 1/05-sampling-convergence.md
          - 6. Matrix Notation and Estimation: modules/module 1/06-estimation.md
          - Technical:
              - T1. Reshaping Panel Data in R: modules/module 1/technical-01-panel-reshaping-r.md
              - T2. Simulated RCT in R: modules/module 1/technical-02-simulated-rct-r.md
              - T3. Law of Large Numbers: modules/module 1/technical-03-lln.md
              - T4. Central Limit Theorem: modules/module 1/technical-04-clt.md
              - T5. Standard Errors: modules/module 1/technical-05-standard-errors.md
      - Module 2:
          - Overview: modules/module 2/module2.md
          - 1. Conditional Expectations and SLR: modules/module 2/01-conditional-expectations-slr.md
          - 2. OLS Estimation: modules/module 2/02-ols-estimation.md
          - 3. OLS Mechanics and Fit: modules/module 2/03-ols-mechanics-fit.md
          - 4. Functional Forms and Dummies: modules/module 2/04-functional-forms-dummies.md
          - 5. SLR Assumptions: modules/module 2/05-slr-assumptions.md
          - 6. Unbiasedness, Variance, and Efficiency: modules/module 2/06-ols-properties.md
  - Guides:
      - First steps: guides/first-steps.md
      - Computing setup: guides/computing-setup.md
      - Reproducible workflow: guides/reproducible-workflow.md
  - References:
      - Git and GitHub: references/git-github.md
      - Python: references/python.md
      - Markdown: references/markdown.md
  - Troubleshooting:
      - Common issues: troubleshooting/common-issues.md
